appId: com.local.voiceflow
productName: VoiceFlow
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  # Exclude test files
  - "!node_modules/**/{test,tests,__tests__}/**"
  # Exclude source maps, TypeScript sources, markdown
  - "!node_modules/**/*.{md,ts,map}"
  # Exclude dev-only packages (not needed at runtime)
  - "!node_modules/typescript/**"
  - "!node_modules/concurrently/**"
  - "!node_modules/wait-on/**"
  - "!node_modules/cross-env/**"
  - "!node_modules/@vitejs/**"
  - "!node_modules/vite/**"
  - "!node_modules/rollup/**"
  - "!node_modules/@rollup/**"
  - "!node_modules/esbuild/**"
  - "!node_modules/@esbuild/**"
  - "!node_modules/postcss/**"
  - "!node_modules/autoprefixer/**"
  - "!node_modules/tailwindcss/**"
  - "!node_modules/app-builder-bin/**"
  - "!node_modules/app-builder-lib/**"
  - "!node_modules/electron-builder/**"
  - "!node_modules/electron-publish/**"
  - "!node_modules/electron-notarize/**"
  # Exclude large unused dependencies
  - "!node_modules/date-fns/**"
  - "!node_modules/rxjs/**"
  - "!node_modules/@babel/**"
extraResources:
  # CPU whisper engine — from build.bat or manual download
  - from: resources/whisper/cpu
    to: whisper/cpu
  # GPU/CUDA DLLs — bundle kalo ada (dari build.bat atau download-whisper)
  - from: resources/whisper/gpu
    to: whisper/gpu
    filter:
      - "*.dll"
  # AI models — user download sendiri via app
  # - from: resources/whisper/models
  #   to: whisper/models
  # App icons
  - from: resources/icons
    to: icons
win:
  executableName: VoiceFlow
  icon: resources/icons/icon.ico
  target:
    - nsis
  publisherName: VoiceFlow
nsis:
  artifactName: "VoiceFlow Setup.${ext}"
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  differentialPackage: false
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico
  installerHeaderIcon: resources/icons/icon.ico
  shortcutName: VoiceFlow
  uninstallDisplayName: VoiceFlow
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  warningsAsErrors: false
  allowElevation: true
  perMachine: false
asar: true
asarUnpack:
  - "node_modules/better-sqlite3/**"
  - "node_modules/uiohook-napi/**"
  - "node_modules/ffmpeg-static/**"
